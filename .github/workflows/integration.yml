name: Integration Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    env:
      NATS_URL: nats://localhost:4222
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:2.10-alpine -js -m 8222
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:8222/healthz >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "NATS did not become healthy in time"
          exit 1

      - name: Integration tests
        run: go test -tags integration -timeout 120s -race ./...
