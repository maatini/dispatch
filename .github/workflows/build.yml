name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Build all services
        run: go build ./cmd/...

  docker:
    name: Docker – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [mail-gateway, mail-worker, mail-admin, bouncemanagement]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=0.5.0
          platforms: linux/amd64
          load: true
          tags: dispatch/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy – vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: dispatch/${{ matrix.service }}:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ matrix.service }}

      - name: Trivy – generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: dispatch/${{ matrix.service }}:ci
          format: cyclonedx
          output: sbom-${{ matrix.service }}.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          retention-days: 90

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/${{ matrix.service }}
          docker tag dispatch/${{ matrix.service }}:ci ${IMAGE}:${{ github.sha }}
          docker tag dispatch/${{ matrix.service }}:ci ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest
