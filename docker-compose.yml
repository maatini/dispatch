services:
  nats:
    image: nats:2.10-alpine
    # WARNING: No authentication configured — for local development only.
    # Do NOT expose to untrusted networks without adding NATS auth credentials.
    command: ["-js", "-m", "8222", "--name", "dispatch-dev"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  dev-proxy:
    image: ghcr.io/dotnet/dev-proxy:latest
    profiles: [proxy]
    ports:
      - "8000:8000"
    volumes:
      - ./dev-proxy:/home/devproxy/app
    environment:
      - DEVPROXY_LOG_LEVEL=Information
