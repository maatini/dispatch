services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--name", "codymail-dev"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
