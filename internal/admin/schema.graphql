type Query {
  senders(filter: SenderFilter): [Sender!]!
  mails(filter: MailFilter, page: Int, size: Int): PagedMailResponse!
  bounces(page: Int, size: Int): PagedBounceResponse!
  deadLetters(page: Int, size: Int): PagedDeadLetterResponse!
}

type Mutation {
  createSender(input: SenderInput!): Sender!
  updateSender(appTag: String!, input: SenderInput!): Sender!
  deleteSender(appTag: String!): Boolean!
  reprocessDeadLetter(payload: String!): Boolean!
}

type Sender {
  appTag: String!
  email: String!
  test: Boolean!
  dailyQuota: Int!
  allowedDomains: String
}

input SenderInput {
  appTag: String!
  email: String!
  test: Boolean!
  dailyQuota: Int!
  allowedDomains: String
}

input SenderFilter {
  appTag: String
}

input MailFilter {
  appTag: String
  status: String
  traceId: String
}

type PagedMailResponse {
  items: [MailRecord!]!
  total: Int!
}

type MailRecord {
  traceId: String!
  appTag: String!
  status: String!
  sender: String!
  subject: String
  recipients: [String!]!
  error: String
  timestamp: String!
}

type PagedBounceResponse {
  items: [BounceRecord!]!
  total: Int!
}

type BounceRecord {
  originalTraceId: String!
  bouncedAt: String!
  bounceReason: String!
  bouncedRecipient: String!
  processedAt: String!
}

type PagedDeadLetterResponse {
  items: [DeadLetterRecord!]!
  total: Int!
}

type DeadLetterRecord {
  payload: String!
  error: String!
  timestamp: String!
}
