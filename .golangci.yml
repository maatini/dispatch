version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - exhaustive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

formatters:
  enable:
    - goimports
    - gofmt

  settings:
    goimports:
      local-prefixes:
        - codymail-go

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - exhaustive
